<!DOCTYPE html>
<html>
<head>
    <title>查詢氣象預報</title>
</head>
<body>
    <h1>查詢氣象預報資訊</h1>
    <form action="/weather" method="post">
        <label for="city">請輸入欲查詢的縣市：</label>
        <input type="text" name="city" id="city" placeholder="例如：臺中市" required>
        <br><br>
        <input type="submit" value="查詢">
    </form>
    <br>
    <a href="/">回到首頁</a>
</body>
</html>
