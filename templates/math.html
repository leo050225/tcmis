<!DOCTYPE html>
<html>
<head>
    <title>數學運算</title>
</head>
<body>
    <h2>簡單數學運算</h2>
    <form action="/math" method="post">
        <input type="number" name="x" placeholder="請輸入數字1" required>
        
        <select name="apt">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select>
        
        <input type="number" name="y" placeholder="請輸入數字2" required>
        
        <button type="submit">計算</button>
    </form>
    <br>
    <a href="/">回首頁</a>
</body>
</html>
